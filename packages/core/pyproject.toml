[project]
name = "osi-core"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "outer-joined", email = "useawe@proton.me" }
]
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.13.4",
    "pyyaml>=6.0",
    "rich>=15.0.0",
    "sqlglot>=30.7.0",
    "typer>=0.25.1",
]

[project.entry-points."osi.adapters"]
osi = "osi_core.adapters:OsiAdapter"
metricflow = "osi_core.adapters:MetricFlowAdapter"

[build-system]
requires = ["uv_build>=0.11.12,<0.12.0"]
build-backend = "uv_build"

[tool.uv]
dev-dependencies = ["pytest", "hypothesis", "syrupy"]