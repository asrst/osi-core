name: analytics_model
semantic_model:
  - name: fct_orders
    description: Fact table for orders
    entities:
      - name: order_id
        type: string
        role: primary
      - name: user_id
        type: string
        role: foreign
    dimensions:
      - name: order_date
        type: date
        description: Date the order was placed
      - name: currency
        type: string
        description: Currency of the order
    measures:
      - name: revenue
        type: float
metrics:
  - name: total_revenue
    type: simple
    expr: SUM(revenue)
    description: Total revenue across all orders
  - name: average_order_value
    type: derived_non_additive
    expr: SUM(revenue) / COUNT(order_id)
    description: Average revenue per order
  - name: running_revenue
    type: cumulative
    expr: SUM(revenue)
    description: Cumulative revenue over time
